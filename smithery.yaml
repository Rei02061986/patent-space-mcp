# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml
# Patent Space MCP — remote Streamable HTTP server

startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      language:
        type: string
        enum:
          - ja
          - en
        default: ja
        description: "Preferred language for search results and labels (ja=Japanese, en=English)."
      defaultMaxResults:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
        description: "Default maximum number of results returned by search and ranking tools."
    additionalProperties: false
  commandFunction: |-
    config => ({ command: 'python', args: ['-m', 'patent_space_mcp'], env: { PATENT_DB_PATH: config.PATENT_DB_PATH || 'data/patents.db', PATENT_LANGUAGE: config.language || 'ja', DEFAULT_MAX_RESULTS: String(config.defaultMaxResults || 20) } })
