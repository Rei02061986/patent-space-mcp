services:
  mcp:
    build: .
    ports:
      - "8001:8001"
    volumes:
      - /mnt/nvme/patent-data:/app/data
      - ./.env:/app/.env:ro
    command: ["--transport", "http", "--host", "0.0.0.0", "--port", "8001"]
    restart: unless-stopped
    environment:
      - PATENT_DB_PATH=/app/data/patents.db
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 48G
